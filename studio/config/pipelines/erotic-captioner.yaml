name: "erotic-captioner"
description: "EC: Erotic Image Captioning Pipeline"
circuit_breaker_limit: 3
steps:
  - id: "mcp-forensic-analysis"
    name: "MCP Forensic Analysis"
    agent: "lnd-orchestrator"
    step_file: "studio/core/mcp-templates/mcp_forensic_analysis.md"
    rule_step: "mcp-forensic-analysis"
    output_schema: "forensic-state.schema.json"
    gate: null
  - id: "mcp-ec-pipeline"
    name: "MCP Erotic Caption Pipeline"
    agent: "lnd-orchestrator"
    step_file: "studio/core/mcp-templates/mcp_ec_pipeline.md"
    rule_step: "mcp-ec-pipeline"
    output_schema: "draft-prose.schema.json"
    gate: "mcp-forensic-analysis"
  - id: "quality-audit"
    name: "Quality Audit"
    agent: "gooner-editor"
    step_file: "studio/core/gooner-audit-engine/templates/quality_audit.md"
    rule_step: "quality-audit"
    output_schema: "audit-report.schema.json"
    gate: "mcp-ec-pipeline"
  - id: "complete"
    name: "Completion"
    agent: "lnd-orchestrator"
    step_file: "studio/core/orchestration/templates/complete.md"
    rule_step: null
    output_schema: null
    gate: "quality-audit"
