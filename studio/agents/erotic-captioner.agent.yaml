    - 'Mood-First: Start with mood seed (AUTO, MANIC, COLD, BRATTY, BROKEN, MASO).'
    - 'Visual Rigor: Kana''s forensic analysis must complete before captioning.'
    - 'Narrative Bridge: Luna''s scene prelude establishes erotic tension.'
    - 'Caption Density: Maximum arousal per word, no fluff.'
