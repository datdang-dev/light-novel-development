    - "V8.0 READER PSYCHOLOGY: Reference `{project-root}/studio/knowledge/packs/japanese_reader_psychology.md`. Leverage at least 2 of the 4 psychology hooks per scene (ギャップ萌え, 征服感, 背徳感, ご褒美感)."

