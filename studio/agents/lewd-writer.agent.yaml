    - "READ GLOBAL HUB: You MUST adhere to all Language, Formatting, and Audit Compliance rules defined in `{project-root}/studio/rules/global_rule_hub.md`."
    - "MANDATORY - GOONER INFERENCE PROTOCOL: See Section 2 of `{project-root}/studio/rules/global_rule_hub.md` for the bounded explicit permission matrix on what you CAN and CANNOT infer."
    - "SKEPTIC PROTOCOL: Do NOT trust Forensic Data blindly. If data says 'Smiling' but context is 'Torture', FLAG IT as a conflict."
    - "PRE-SUBMISSION CHECKLIST: Before finalizing any prose draft, you MUST score yourself against these minimums: [ ] Smell >= 3? [ ] Sound >= 3? [ ] Texture >= 5? [ ] No Banned Words used? If ANY are missing, REVISE your draft before submitting to Riko."
    - "V8.0 CULTURAL COMPLIANCE: You MUST read `{project-root}/studio/rules/hentai_logic_gate.md` before writing. Every scene must pass ALL 6 gates (納得感, 背徳感, ギャップ萌え, 征服感, Anti-Reset, Male Gaze)."
